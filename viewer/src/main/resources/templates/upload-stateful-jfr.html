<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JFR Viewer - Upload</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="page-header">
        <h1><a href="/" style="color: inherit; text-decoration: none;">JFR Viewer</a></h1>
        <p>Upload Java Flight Recorder files for analysis</p>
    </div>

    <div th:if="${!files.isEmpty()}" class="card mb-2" style="margin-bottom:1.5rem">
        <div class="card-header">Files in memory</div>
        <div class="card-body" style="padding: 0;">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th style="text-align:left">Import date</th>
                        <th style="text-align:left">Imported files</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="file, fileStatus: ${files}" th:inline="text">
                        <td class="text-mono" style="text-align:left">[[${file.id}]]</td>
                        <td style="text-align:left">[[${file.parseStartDate}]]</td>
                        <td style="text-align:left; white-space: normal; word-break: break-all;">
                            <span th:each="fileName, fileNameStatus: ${file.filenames}" th:inline="text">
                                [[${fileName}]]<br th:if="${!fileNameStatus.last}"/>
                            </span>
                        </td>
                        <td class="text-center">
                            <a class="btn btn-sm btn-primary" target="_blank" th:href="'/stateful-jfr/single?id=' + ${file.id}">Open</a>
                            <a class="btn btn-sm btn-danger" th:href="'/stateful-jfr/single/remove?id=' + ${file.id}" style="margin-left: 0.25rem">Remove</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">Upload new files</div>
        <div class="card-body">
            <form method="POST" enctype="multipart/form-data" action="/upload-stateful-jfr" target="_blank">
                <div class="form-group">
                    <label>JFR files</label>
                    <input name="files" type="file" multiple class="form-input" style="padding: 0.375rem;">
                </div>

                <div class="checkbox-row">
                    <input id="oldAsyncProfiler" name="oldAsyncProfiler" type="checkbox"/>
                    <label for="oldAsyncProfiler">JFR not from Async-profiler or from Async-profiler &lt; 3.0</label>
                </div>
                <div class="checkbox-row">
                    <input id="wallClockExactTime" name="wallClockExactTime" type="checkbox"/>
                    <label for="wallClockExactTime">Try to extract exact time for wall-clock events</label>
                </div>
                <div class="checkbox-row">
                    <input id="unifyLambdas" name="unifyLambdas" type="checkbox"/>
                    <label for="unifyLambdas">Unify lambda names (useful for multiple JVMs)</label>
                </div>
                <div class="checkbox-row" style="margin-bottom: 1.25rem;">
                    <input id="throwOnErroredFile" name="throwOnErroredFile" type="checkbox"/>
                    <label for="throwOnErroredFile">Fail if any file cannot be parsed</label>
                </div>

                <button class="btn btn-primary" type="submit">Upload &amp; Analyze</button>
            </form>
        </div>
    </div>

    <div class="footer">
        Tip: Compress JFR files (<strong>*.gz</strong>) for faster uploads.<br>
        Author: Krzysztof Slusarski &middot; <a href="mailto:ks@gclogs.com">ks@gclogs.com</a>
    </div>
</div>
</body>
</html>
