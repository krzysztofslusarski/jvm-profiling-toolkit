<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
    <link href="/css/welcome.css" rel="stylesheet">
    <script src="/js/theme.js"></script>
    <title th:inline="text">[[${welcomePage.title}]]</title>
</head>
<body>
<button class="theme-toggle theme-toggle-fixed" data-theme-toggle aria-label="Toggle dark mode"></button>
<div class="container-wide collapsed-page">
    <div class="page-header">
        <h1 th:inline="text"><a href="/" style="color: inherit; text-decoration: none;">[[${welcomePage.title}]]</a></h1>
    </div>

    <div th:each="page, pagesStatus: ${welcomePage.pages}"
         th:class="'section-card card subpage page-' + ${pagesStatus.index}"
         th:inline="text">

        <div th:class="'card-header card-title-' + ${pagesStatus.index}">
            <span>[[${page.fullName}]]</span>
            <svg class="chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </div>

        <div th:class="'card-body card-content-' + ${pagesStatus.index}">
            <p th:if="${page.info != null}" class="text-secondary mb-2" th:inline="text">[[${page.info}]]</p>

            <div th:each="content, contentStatus: ${page.pageContents}" th:inline="text" style="margin-bottom: 1rem;">
                <h4 th:if="${content.title != null}" style="margin-bottom: 0.75rem;" th:inline="text">[[${content.title}]]</h4>
                <p th:if="${content.info != null}" class="text-secondary mb-1" th:inline="text">[[${content.info}]]</p>

                <div th:if="${content.type.name() == 'TABLE_WITH_LINKS'}">
                    <div th:if="${content.filteredColumn != null}" class="search-box">
                        <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text"
                               th:data-table-id="${'table-' + pagesStatus.index + '-' + contentStatus.index}"
                               th:data-column="${content.filteredColumn}"
                               onkeyup="filterTable(this)" placeholder="Search..."/>
                    </div>

                    <div class="table-wrapper">
                        <table th:id="${'table-' + pagesStatus.index + '-' + contentStatus.index}"
                               class="data-table"
                               th:style="'width: ' + ${content.screenWidth} + ';'">
                            <thead th:if="${content.header != null}">
                            <tr>
                                <th th:each="column, columnStatus: ${content.header}" th:inline="text">
                                    [[${column}]]
                                </th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="row, rowStatus: ${content.table}">
                                <td th:each="column, columnStatus: ${row}" th:inline="text">
                                    <span th:if="${column.href != null}">
                                        <a target="_blank" th:href="${column.href}">[[${column.description}]]</a>
                                    </span>
                                    <span th:if="${column.href == null}">
                                        [[${column.description}]]
                                    </span>
                                </td>
                            </tr>
                            </tbody>
                            <tfoot th:if="${content.footer != null}">
                            <tr>
                                <td th:each="column, columnStatus: ${content.footer}" th:inline="text">
                                    [[${column}]]
                                </td>
                            </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>

                <div th:if="${content.type.name() == 'PROFILING_RESULTS'}">
                    <div th:if="${content.filteredColumn != null}" class="search-box">
                        <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text"
                               th:data-table-id="${'table-' + pagesStatus.index + '-' + contentStatus.index}"
                               th:data-column="${content.filteredColumn}"
                               onkeyup="filterTable(this)" placeholder="Search..."/>
                    </div>

                    <div class="table-wrapper">
                        <table th:id="${'table-' + pagesStatus.index + '-' + contentStatus.index}"
                               class="data-table" style="width: 100%;">
                            <thead>
                            <tr>
                                <th>Method</th>
                                <th class="text-center">Time%</th>
                                <th class="text-center">Samples</th>
                                <th class="text-center">Links</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="row, rowStatus: ${content.profilingEntries}">
                                <td style="text-align:left; white-space: normal; word-break: break-all;">[[${row.methodName}]]</td>
                                <td class="text-center" style="white-space: nowrap">[[${row.percent}]]</td>
                                <td class="text-center" style="white-space: nowrap">[[${row.samples}]]</td>
                                <td class="text-center" style="white-space: nowrap">
                                    <span class="profiling-links">
                                        <img src="img/flame.png" height="18"/>
                                        <a target="_blank" th:href="${row.profilingLinks.fromMethodFlameGraph}"><img src="img/up.png" height="18"/></a>
                                        <a target="_blank" th:href="${row.profilingLinks.toMethodFlameGraph}"><img src="img/down.png" height="18"/></a>
                                        &nbsp;
                                        <img src="img/table.png" height="18"/>
                                        <a target="_blank" th:href="${row.profilingLinks.fromMethodRoot}"><img src="img/up.png" height="18"/></a>
                                        <a target="_blank" th:href="${row.profilingLinks.toMethodRoot}"><img src="img/down.png" height="18"/></a>
                                    </span>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <script type="text/javascript" th:inline="javascript">
                document.addEventListener('DOMContentLoaded', function () {
                    var id = /*[[${pagesStatus.index}]]*/;
                    var header = document.querySelector('.card-title-' + id);
                    if (header) {
                        header.addEventListener('click', function () {
                            var contents = document.querySelectorAll('.card-content-' + id);
                            contents.forEach(function (el) {
                                el.style.display = el.style.display === 'none' ? '' : 'none';
                            });
                            header.classList.toggle('collapsed');
                        });
                    }
                });
            </script>
        </div>
    </div>
</div>

<script type="text/javascript">
    function filterTable(input) {
        var column = parseInt(input.getAttribute('data-column'));
        var tableId = input.getAttribute('data-table-id');
        var value = input.value.toLowerCase();
        var rows = document.querySelectorAll('#' + tableId + ' tbody tr');
        for (var i = 0; i < rows.length; i++) {
            var cells = rows[i].querySelectorAll('td');
            var cell = cells[column];
            if (cell) {
                rows[i].style.display = cell.textContent.toLowerCase().indexOf(value) > -1 ? '' : 'none';
            }
        }
    }
</script>
</body>
</html>
