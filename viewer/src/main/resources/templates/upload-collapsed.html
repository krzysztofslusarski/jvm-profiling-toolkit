<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Collapsed Stack Viewer - Upload</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
    <script src="/js/theme.js"></script>
</head>
<body>
<button class="theme-toggle theme-toggle-fixed" data-theme-toggle aria-label="Toggle dark mode"></button>
<div class="container">
    <div class="page-header">
        <h1><a href="/" style="color: inherit; text-decoration: none;">Collapsed Stack Viewer</a></h1>
        <p>Upload collapsed stack files for flame graph analysis</p>
    </div>

    <div class="card">
        <div class="card-header">Upload file</div>
        <div class="card-body">
            <form method="POST" enctype="multipart/form-data" action="/upload-collapsed" target="_blank">
                <div class="form-group">
                    <label>Stack trace file</label>
                    <input name="file" type="file" class="form-input" style="padding: 0.375rem;">
                </div>

                <div class="form-group">
                    <label for="title">Title (visible on every page)</label>
                    <input id="title" name="title" type="text" class="form-input" placeholder="e.g. Production load test 2024-03-12"/>
                </div>

                <div class="form-group">
                    <label for="totalTimeThreshold">Total time threshold</label>
                    <input id="totalTimeThreshold" name="totalTimeThreshold" type="text" class="form-input" value="0.001"/>
                </div>

                <div class="form-group">
                    <label for="selfTimeThreshold">Self time threshold</label>
                    <input id="selfTimeThreshold" name="selfTimeThreshold" type="text" class="form-input" value="0.0001"/>
                </div>

                <div class="form-group">
                    <label for="filter">Filter stacks by</label>
                    <input id="filter" name="filter" type="text" class="form-input" placeholder="e.g. com.example.MyClass"/>
                </div>

                <button class="btn btn-primary" type="submit">Upload &amp; Analyze</button>
            </form>
        </div>
    </div>

    <div class="footer">
        Supports compressed files: <strong>*.zip, *.gz, *.xz, *.7z</strong><br>
        Author: Krzysztof Slusarski &middot; <a href="mailto:ks@gclogs.com">ks@gclogs.com</a>
    </div>
</div>
</body>
</html>
