<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
    <script src="/js/theme.js"></script>
</head>
<body>
<div class="iframe-page">
    <h3 class="section-title">Correlation ID Info <span style="font-weight: 400; font-size: 0.875rem; color: var(--text-secondary);">- 1000 longest entries</span></h3>
    <div class="table-wrapper">
        <table class="data-table">
            <thead>
            <tr>
                <th>Correlation ID</th>
                <th>Time spent</th>
                <th>Wall samples</th>
                <th>CPU samples</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="row, rowStatus: ${correlationIdStats}">
                <td class="text-mono" style="text-align: left" th:inline="text">[[${row.getEcid()}]]</td>
                <td th:inline="text">[[${row.timeDiff()}]]</td>
                <td th:inline="text">[[${row.getWallSamples()}]]</td>
                <td th:inline="text">[[${row.getCpuSamples()}]]</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
