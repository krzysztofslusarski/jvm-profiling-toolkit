<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
    <script src="/js/theme.js"></script>
</head>
<body>
<div class="iframe-page">
    <h3 class="section-title">Self Time Statistics</h3>

    <div class="search-box">
        <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" onkeyup="filterTable(this)" placeholder="Search methods..."/>
    </div>

    <div class="table-wrapper">
        <table class="data-table" id="table">
            <thead>
            <tr>
                <th>Method name</th>
                <th>Samples</th>
                <th>Percent</th>
                <th class="text-center">Trim</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="row, rowStatus: ${table.rows}">
                <td style="text-align:left; white-space: normal; word-break: break-all;" th:inline="text">[[${row.methodName}]]</td>
                <td th:inline="text">[[${row.samples}]]</td>
                <td th:inline="text">[[${row.percent}]]</td>
                <td class="text-center">
                    <div class="trim-links">
                        <img src="/img/flame.png" height="18"/>
                        <a target="_blank" th:href="'/stateful-jfr/single/trim?id=' + ${table.fileId} + '&methodName=' + ${row.methodName} + '&direction=UP'">
                            <img src="/img/up.png" height="18"/>
                        </a>
                        <a target="_blank" th:href="'/stateful-jfr/single/trim?id=' + ${table.fileId} + '&methodName=' + ${row.methodName} + '&direction=DOWN'">
                            <img src="/img/down.png" height="18"/>
                        </a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
function filterTable(input) {
    var value = input.value.toLowerCase();
    var rows = document.querySelectorAll('#table tbody tr');
    for (var i = 0; i < rows.length; i++) {
        var cell = rows[i].querySelector('td');
        if (cell) {
            rows[i].style.display = cell.textContent.toLowerCase().indexOf(value) > -1 ? '' : 'none';
        }
    }
}
</script>
</body>
</html>
