<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
    <script src="https://code.highcharts.com/highcharts.src.js"></script>
    <script src="https://code.highcharts.com/modules/boost.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
</head>
<body style="background: #fff;">

<script type="text/javascript">
    function commonHighChartsLineChartsOptions(xAxisLabel, yAxisLabel) {
        return {
            title: { text: '' },
            chart: {
                height: Math.min(window.innerHeight * 0.55, 500),
                zoomType: 'x',
                style: { fontFamily: 'Inter, system-ui, sans-serif' }
            },
            colors: ['#4f46e5', '#06b6d4', '#f59e0b', '#ef4444', '#10b981', '#8b5cf6', '#ec4899'],
            tooltip: { pointFormat: '{series.name}: <b>{point.y}</b><br/>' },
            legend: { align: 'left', verticalAlign: 'top', borderWidth: 0 },
            plotOptions: {
                series: { label: { connectorAllowed: false } },
                scatter: { marker: { radius: 2 } }
            },
            xAxis: { title: { text: xAxisLabel } },
            yAxis: { title: { text: yAxisLabel }, min: 0, max: 1 }
        }
    }
</script>

<div class="iframe-page">

    <div class="chart-container">
        <h4 class="section-title">CPU Statistics - Machine Total</h4>
        <div id="container-machine-total"></div>
        <script type="text/javascript" th:inline="javascript">
            var common = {...commonHighChartsLineChartsOptions("Time", "CPU usage")};
            Highcharts.chart('container-machine-total', {
                ...common,
                chart: { ...common.chart, type: 'line' },
                xAxis: { ...common.xAxis },
                series: /*[[${cpuStats.generateMachineTotalHighChart()}]]*/,
            });
        </script>
    </div>

    <div class="chart-container">
        <h4 class="section-title">CPU Statistics - JVM Total</h4>
        <div id="container-jvm-total"></div>
        <script type="text/javascript" th:inline="javascript">
            var common = {...commonHighChartsLineChartsOptions("Time", "CPU usage")};
            Highcharts.chart('container-jvm-total', {
                ...common,
                chart: { ...common.chart, type: 'line' },
                xAxis: { ...common.xAxis },
                series: /*[[${cpuStats.generateJvmTotalHighChart()}]]*/,
            });
        </script>
    </div>

    <div class="chart-container">
        <h4 class="section-title">CPU Statistics - Not JVM Total</h4>
        <div id="container-not-jvm-total"></div>
        <script type="text/javascript" th:inline="javascript">
            var common = {...commonHighChartsLineChartsOptions("Time", "CPU usage")};
            Highcharts.chart('container-not-jvm-total', {
                ...common,
                chart: { ...common.chart, type: 'line' },
                xAxis: { ...common.xAxis },
                series: /*[[${cpuStats.generateNotJvmTotalHighChart()}]]*/,
            });
        </script>
    </div>

    <div class="chart-container">
        <h4 class="section-title">CPU Statistics - JVM User</h4>
        <div id="container-jvm-user"></div>
        <script type="text/javascript" th:inline="javascript">
            var common = {...commonHighChartsLineChartsOptions("Time", "CPU usage")};
            Highcharts.chart('container-jvm-user', {
                ...common,
                chart: { ...common.chart, type: 'line' },
                xAxis: { ...common.xAxis },
                series: /*[[${cpuStats.generateJvmUserHighChart()}]]*/,
            });
        </script>
    </div>

    <div class="chart-container">
        <h4 class="section-title">CPU Statistics - JVM System</h4>
        <div id="container-jvm-system"></div>
        <script type="text/javascript" th:inline="javascript">
            var common = {...commonHighChartsLineChartsOptions("Time", "CPU usage")};
            Highcharts.chart('container-jvm-system', {
                ...common,
                chart: { ...common.chart, type: 'line' },
                xAxis: { ...common.xAxis },
                series: /*[[${cpuStats.generateJvmSystemHighChart()}]]*/,
            });
        </script>
    </div>

</div>
</body>
</html>
