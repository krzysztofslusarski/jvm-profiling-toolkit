<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JFR Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>

<body th:data-current="${currentId}" style="overflow: hidden;">

<div class="viewer-layout">
    <!-- ====== SIDEBAR ====== -->
    <aside class="viewer-sidebar">
        <div class="sidebar-brand">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
            <a href="/upload-stateful-jfr">JFR Viewer</a>
        </div>

        <!-- View Mode -->
        <div class="sidebar-section">
            <div class="sidebar-section-title">View</div>
            <div class="radio-row">
                <input name="page" type="radio" id="pageFlames" onclick="return enableFlameGraphs()" checked/>
                <label for="pageFlames">Flame graphs</label>
            </div>
            <div class="radio-row">
                <input name="page" type="radio" id="pageTotalTime" onclick="return enableTotalTimeTable()"/>
                <label for="pageTotalTime">Total time table</label>
            </div>
            <div class="radio-row">
                <input name="page" type="radio" id="pageSelfTime" onclick="return enableSelfTimeTable()"/>
                <label for="pageSelfTime">Self time table</label>
            </div>
            <div class="radio-row">
                <input name="page" type="radio" id="pageCorrId" onclick="return enableCorrelationId()"/>
                <label for="pageCorrId">Correlation ID stats</label>
            </div>
            <div class="radio-row">
                <input name="page" type="radio" id="pageCpu" onclick="return enableCpu()"/>
                <label for="pageCpu">CPU stats</label>
            </div>
        </div>

        <!-- Events -->
        <div class="sidebar-section" id="events">
            <div class="sidebar-section-title">Events</div>

            <div th:if="${file.getExecutionSamples().size() > 0}" class="radio-row">
                <input name="event" type="radio"
                       onclick="return updatePages(this)"
                       th:data-current="${currentId}"
                       th:data-total-time-table-url="'/stateful-jfr/single/table/total/execution?id=' + ${currentId}"
                       th:data-self-time-table-url="'/stateful-jfr/single/table/self/execution?id=' + ${currentId}"
                       th:data-flames-url="'/stateful-jfr/single/flames/execution?id=' + ${currentId}"
                       id="eventExec"/>
                <label for="eventExec">Execution samples</label>
            </div>
            <div th:if="${file.getWallClockSamples().size() > 0}" class="radio-row">
                <input name="event" type="radio"
                       onclick="return updatePages(this)"
                       th:data-current="${currentId}"
                       th:data-total-time-table-url="'/stateful-jfr/single/table/total/wall?id=' + ${currentId}"
                       th:data-self-time-table-url="'/stateful-jfr/single/table/self/wall?id=' + ${currentId}"
                       th:data-flames-url="'/stateful-jfr/single/flames/wall?id=' + ${currentId}"
                       id="eventWall"/>
                <label for="eventWall">Wall-clock samples</label>
            </div>
            <div th:if="${file.getAllocationSamples().size() > 0}" class="radio-row">
                <input name="event" type="radio"
                       onclick="return updatePages(this)"
                       th:data-current="${currentId}"
                       th:data-total-time-table-url="'/stateful-jfr/single/table/total/allocation/count?id=' + ${currentId}"
                       th:data-self-time-table-url="'/stateful-jfr/single/table/self/allocation/count?id=' + ${currentId}"
                       th:data-flames-url="'/stateful-jfr/single/flames/allocation/count?id=' + ${currentId}"
                       id="eventAllocCount"/>
                <label for="eventAllocCount">Alloc. samples (count)</label>
            </div>
            <div th:if="${file.getAllocationSamples().size() > 0}" class="radio-row">
                <input name="event" type="radio"
                       onclick="return updatePages(this)"
                       th:data-current="${currentId}"
                       th:data-total-time-table-url="'/stateful-jfr/single/table/total/allocation/size?id=' + ${currentId}"
                       th:data-self-time-table-url="'/stateful-jfr/single/table/self/allocation/size?id=' + ${currentId}"
                       th:data-flames-url="'/stateful-jfr/single/flames/allocation/size?id=' + ${currentId}"
                       id="eventAllocSize"/>
                <label for="eventAllocSize">Alloc. samples (size)</label>
            </div>
            <div th:if="${file.getLockSamples().size() > 0}" class="radio-row">
                <input name="event" type="radio"
                       onclick="return updatePages(this)"
                       th:data-current="${currentId}"
                       th:data-total-time-table-url="'/stateful-jfr/single/table/total/lock/count?id=' + ${currentId}"
                       th:data-self-time-table-url="'/stateful-jfr/single/table/self/lock/count?id=' + ${currentId}"
                       th:data-flames-url="'/stateful-jfr/single/flames/lock/count?id=' + ${currentId}"
                       id="eventLockCount"/>
                <label for="eventLockCount">Lock samples (count)</label>
            </div>
            <div th:if="${file.getLockSamples().size() > 0}" class="radio-row">
                <input name="event" type="radio"
                       onclick="return updatePages(this)"
                       th:data-current="${currentId}"
                       th:data-total-time-table-url="'/stateful-jfr/single/table/total/lock/time?id=' + ${currentId}"
                       th:data-self-time-table-url="'/stateful-jfr/single/table/self/lock/time?id=' + ${currentId}"
                       th:data-flames-url="'/stateful-jfr/single/flames/lock/time?id=' + ${currentId}"
                       id="eventLockTime"/>
                <label for="eventLockTime">Lock samples (time)</label>
            </div>
        </div>

        <!-- Options -->
        <div class="sidebar-section" id="additionalOptionsContainer">
            <div class="sidebar-section-title" onclick="toggleSection(this)">
                Options
                <svg class="chevron" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="section-body">
                <div class="form-group" style="margin-bottom: 0.75rem;">
                    <label style="color: var(--text-sidebar-heading); font-size: 0.75rem;">Table limit</label>
                    <input id="tableLimit" name="tableLimit" type="text" value="10000"/>
                </div>
                <div class="checkbox-row">
                    <input id="reverseOn" name="reverseOn" type="checkbox"/>
                    <label for="reverseOn">Reverse flame graph</label>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="sidebar-section" id="additionalFiltersContainer">
            <div class="sidebar-section-title" onclick="toggleSection(this)">
                Filters
                <svg class="chevron" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="section-body">
                <!-- Thread filter (equals) -->
                <div class="filter-group">
                    <div class="checkbox-row">
                        <input id="threadFilterOn" name="threadFilterOn" type="checkbox" onchange="toggleFilter('threadFilterContent', this)"/>
                        <label for="threadFilterOn">Thread (equals)</label>
                    </div>
                    <div id="threadFilterContent" class="filter-inputs">
                        <input id="threadFilter" name="threadFilter" type="text" placeholder="Thread name"/>
                    </div>
                </div>

                <!-- Thread filter (contains) -->
                <div class="filter-group">
                    <div class="checkbox-row">
                        <input id="threadFilterContainsOn" name="threadFilterContainsOn" type="checkbox" onchange="toggleFilter('threadFilterContainsContent', this)"/>
                        <label for="threadFilterContainsOn">Thread (contains)</label>
                    </div>
                    <div id="threadFilterContainsContent" class="filter-inputs">
                        <input id="threadFilterContains" name="threadFilterContains" type="text" placeholder="Thread name part"/>
                    </div>
                </div>

                <!-- Stack trace filter (contains) - multiple -->
                <div class="filter-group">
                    <div class="checkbox-row">
                        <input id="stackTraceFilterOn" name="stackTraceFilterOn" type="checkbox" onchange="toggleFilter('stackTraceFilterContent', this)"/>
                        <label for="stackTraceFilterOn">Stack trace (contains)</label>
                    </div>
                    <div id="stackTraceFilterContent" class="filter-inputs">
                        <div id="stackTraceFilterList">
                            <div class="filter-row stack-trace-filter-row">
                                <input name="stackTraceFilter_0" type="text" class="stack-trace-filter-input" placeholder="e.g. com.example"/>
                                <button class="btn-remove-filter" onclick="removeFilterRow(this, 'stackTraceFilterList')" style="display:none">
                                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                </button>
                            </div>
                        </div>
                        <button class="btn-add-filter" onclick="addFilterRow('stackTraceFilterList', 'stackTraceFilter')">
                            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            Add filter
                        </button>
                    </div>
                </div>

                <!-- Stack trace filter (not contains) - multiple -->
                <div class="filter-group">
                    <div class="checkbox-row">
                        <input id="stackTraceNotContainsFilterOn" name="stackTraceNotContainsFilterOn" type="checkbox" onchange="toggleFilter('stackTraceNotContainsFilterContent', this)"/>
                        <label for="stackTraceNotContainsFilterOn">Stack trace (not contains)</label>
                    </div>
                    <div id="stackTraceNotContainsFilterContent" class="filter-inputs">
                        <div id="stackTraceNotContainsFilterList">
                            <div class="filter-row stack-trace-filter-row">
                                <input name="stackTraceNotContainsFilter_0" type="text" class="stack-trace-not-contains-filter-input" placeholder="e.g. sun.misc"/>
                                <button class="btn-remove-filter" onclick="removeFilterRow(this, 'stackTraceNotContainsFilterList')" style="display:none">
                                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                </button>
                            </div>
                        </div>
                        <button class="btn-add-filter" onclick="addFilterRow('stackTraceNotContainsFilterList', 'stackTraceNotContainsFilter')">
                            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            Add filter
                        </button>
                    </div>
                </div>

                <!-- Correlation ID -->
                <div class="filter-group">
                    <div class="checkbox-row">
                        <input id="ecidFilterOn" name="ecidFilterOn" type="checkbox" onchange="toggleFilter('ecidFilterContent', this)"/>
                        <label for="ecidFilterOn">Correlation ID</label>
                    </div>
                    <div id="ecidFilterContent" class="filter-inputs">
                        <input id="ecidFilter" name="ecidFilter" type="text" placeholder="Correlation ID"/>
                    </div>
                </div>

                <!-- Access log filter -->
                <div class="filter-group">
                    <div class="checkbox-row">
                        <input id="endDurationOn" name="endDurationOn" type="checkbox" onchange="toggleTimeFilter('endDurationContent', this)"/>
                        <label for="endDurationOn">Access log filter</label>
                    </div>
                    <div id="endDurationContent" class="filter-inputs">
                        <input id="endDate" name="endDate" type="text" placeholder="End date"/>
                        <input id="endDateDateTimeFormat" name="endDateDateTimeFormat" type="text" value="dd/MMM/yyyy:HH:mm:ss Z" placeholder="Date format" style="margin-top: 0.375rem"/>
                        <input id="duration" name="duration" type="text" placeholder="Duration (ms)" style="margin-top: 0.375rem"/>
                        <input id="localeLanguage" name="localeLanguage" type="text" value="EN" placeholder="Locale" style="margin-top: 0.375rem"/>
                    </div>
                </div>

                <!-- Start/end timestamp -->
                <div class="filter-group">
                    <div class="checkbox-row">
                        <input id="startEndTimestampOn" name="startEndTimestampOn" type="checkbox" onchange="toggleTimeFilter('startEndTimestampContent', this)"/>
                        <label for="startEndTimestampOn">Start/end timestamp</label>
                    </div>
                    <div id="startEndTimestampContent" class="filter-inputs">
                        <input id="startTs" name="startTs" type="text" placeholder="Start timestamp (s)"/>
                        <input id="endTs" name="endTs" type="text" placeholder="End timestamp (s)" style="margin-top: 0.375rem"/>
                    </div>
                </div>

                <!-- Warmup/cooldown -->
                <div class="filter-group">
                    <div class="checkbox-row">
                        <input id="warmupCooldownOn" name="warmupCooldownOn" type="checkbox" onchange="toggleTimeFilter('warmupCooldownContent', this)"/>
                        <label for="warmupCooldownOn">Warmup / cooldown</label>
                    </div>
                    <div id="warmupCooldownContent" class="filter-inputs">
                        <input id="warmup" name="warmup" type="text" placeholder="Warmup (s)"/>
                        <input id="cooldown" name="cooldown" type="text" placeholder="Cooldown (s)" style="margin-top: 0.375rem"/>
                    </div>
                </div>

                <!-- Warmup/duration -->
                <div class="filter-group">
                    <div class="checkbox-row">
                        <input id="warmupDurationOn" name="warmupDurationOn" type="checkbox" onchange="toggleTimeFilter('warmupDurationContent', this)"/>
                        <label for="warmupDurationOn">Warmup / duration</label>
                    </div>
                    <div id="warmupDurationContent" class="filter-inputs">
                        <input id="wdWarmup" name="wdWarmup" type="text" placeholder="Warmup (s)"/>
                        <input id="wdDuration" name="wdDuration" type="text" placeholder="Duration (s)" style="margin-top: 0.375rem"/>
                    </div>
                </div>

                <!-- Consume CPU -->
                <div class="checkbox-row">
                    <input id="consumeCpuOn" name="consumeCpuOn" type="checkbox"/>
                    <label for="consumeCpuOn">Consume CPU only</label>
                </div>
            </div>
        </div>

        <!-- Additional Levels -->
        <div class="sidebar-section">
            <div class="sidebar-section-title" onclick="toggleSection(this)">
                Additional Levels
                <svg class="chevron" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="section-body">
                <div class="checkbox-row">
                    <input class="additional-level" id="extractThreads" name="extractThreads" type="checkbox"/>
                    <label for="extractThreads">Thread</label>
                </div>
                <div class="checkbox-row">
                    <input class="additional-level" id="extractTs10S" name="extractTs10S" type="checkbox"/>
                    <label for="extractTs10S">Timestamp (10s)</label>
                </div>
                <div class="checkbox-row">
                    <input class="additional-level" id="extractTs1S" name="extractTs1S" type="checkbox"/>
                    <label for="extractTs1S">Timestamp (1s)</label>
                </div>
                <div class="checkbox-row">
                    <input class="additional-level" id="extractTs100Ms" name="extractTs100Ms" type="checkbox"/>
                    <label for="extractTs100Ms">Timestamp (100ms)</label>
                </div>
                <div class="checkbox-row">
                    <input class="additional-level" id="extractFilename" name="extractFilename" type="checkbox"/>
                    <label for="extractFilename">Filename</label>
                </div>
                <div class="checkbox-row">
                    <input class="additional-level" id="extractEcid" name="extractEcid" type="checkbox"/>
                    <label for="extractEcid">Correlation ID</label>
                </div>
                <div class="checkbox-row">
                    <input class="additional-level" id="extractLineNumbers" name="extractLineNumbers" type="checkbox"/>
                    <label for="extractLineNumbers">Line numbers</label>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="sidebar-actions">
            <button class="btn-reload" onclick="return updatePages()">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                Reload
            </button>
            <button class="btn-newtab" onclick="clonePage(); return false;">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
            <a class="btn-newtab" href="#" id="newTab" target="_blank" style="display:none;">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            </a>
        </div>
    </aside>

    <!-- ====== MAIN CONTENT ====== -->
    <main class="viewer-content">
        <iframe id="externalContent"></iframe>
    </main>
</div>

<script type="text/javascript">
    // ---- Toggle helpers ----
    function toggleSection(titleEl) {
        titleEl.classList.toggle('collapsed');
        var body = titleEl.nextElementSibling;
        if (body) body.style.display = body.style.display === 'none' ? '' : 'none';
    }

    function toggleFilter(contentId, checkbox) {
        var el = document.getElementById(contentId);
        if (el) el.classList.toggle('visible', checkbox.checked);
    }

    var timeFilterIds = ['endDurationContent', 'startEndTimestampContent', 'warmupCooldownContent', 'warmupDurationContent'];
    var timeCheckboxIds = ['endDurationOn', 'startEndTimestampOn', 'warmupCooldownOn', 'warmupDurationOn'];

    function toggleTimeFilter(contentId, checkbox) {
        // Time filters are mutually exclusive
        timeFilterIds.forEach(function (id) {
            var el = document.getElementById(id);
            if (el) el.classList.remove('visible');
        });
        timeCheckboxIds.forEach(function (id) {
            var cb = document.getElementById(id);
            if (cb && cb !== checkbox) cb.checked = false;
        });
        if (checkbox.checked) {
            var el = document.getElementById(contentId);
            if (el) el.classList.add('visible');
        }
    }

    // ---- Multi-filter rows ----
    function addFilterRow(listId, prefix) {
        var list = document.getElementById(listId);
        var rows = list.querySelectorAll('.stack-trace-filter-row');
        var index = rows.length;
        var div = document.createElement('div');
        div.className = 'filter-row stack-trace-filter-row';
        div.innerHTML = '<input name="' + prefix + '_' + index + '" type="text" placeholder="e.g. com.example"/>' +
            '<button class="btn-remove-filter" onclick="removeFilterRow(this, \'' + listId + '\')">' +
            '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';
        list.appendChild(div);
        updateRemoveButtons(listId);
    }

    function removeFilterRow(btn, listId) {
        btn.closest('.stack-trace-filter-row').remove();
        reindexFilterRows(listId);
        updateRemoveButtons(listId);
    }

    function reindexFilterRows(listId) {
        var prefix = listId === 'stackTraceFilterList' ? 'stackTraceFilter' : 'stackTraceNotContainsFilter';
        var rows = document.querySelectorAll('#' + listId + ' .stack-trace-filter-row');
        rows.forEach(function (row, index) {
            var input = row.querySelector('input[type=text]');
            if (input) input.name = prefix + '_' + index;
        });
    }

    function updateRemoveButtons(listId) {
        var rows = document.querySelectorAll('#' + listId + ' .stack-trace-filter-row');
        rows.forEach(function (row) {
            var btn = row.querySelector('.btn-remove-filter');
            if (btn) btn.style.display = rows.length <= 1 ? 'none' : '';
        });
    }

    // ---- Page/view switching ----
    var externalContent = document.getElementById('externalContent');
    var newTabBtn = document.getElementById('newTab');
    var currentToShow = 'flameGraphUrl';
    var storedUrls = {};

    function enableFlameGraphs() {
        externalContent.style.display = '';
        newTabBtn.style.display = '';
        currentToShow = 'flameGraphUrl';
        updateExternalContent();
    }
    function enableTotalTimeTable() {
        externalContent.style.display = '';
        newTabBtn.style.display = '';
        currentToShow = 'totalTimeTableUrl';
        updateExternalContent();
    }
    function enableSelfTimeTable() {
        externalContent.style.display = '';
        newTabBtn.style.display = '';
        currentToShow = 'selfTimeTableUrl';
        updateExternalContent();
    }
    function enableCorrelationId() {
        externalContent.style.display = '';
        newTabBtn.style.display = '';
        currentToShow = 'correlationIdStatsUrl';
        updateExternalContent();
    }
    function enableCpu() {
        externalContent.style.display = '';
        newTabBtn.style.display = '';
        currentToShow = 'cpuStatsUrl';
        updateNotEventDependentPages();
        updateExternalContent();
    }

    function updateExternalContent() {
        var url = storedUrls[currentToShow];
        if (url) {
            externalContent.src = url;
            newTabBtn.href = url;
        }
    }

    function collectParams() {
        var params = '';
        // Checked checkboxes in filters
        document.querySelectorAll('#additionalFiltersContainer input[type=checkbox]:checked').forEach(function (el) {
            params += '&' + el.name + '=on';
        });
        // Text inputs in filters
        document.querySelectorAll('#additionalFiltersContainer input[type=text]').forEach(function (el) {
            params += '&' + el.name + '=' + encodeURIComponent(el.value);
        });
        // Checked checkboxes in options
        document.querySelectorAll('#additionalOptionsContainer input[type=checkbox]:checked').forEach(function (el) {
            params += '&' + el.name + '=on';
        });
        // Additional levels
        document.querySelectorAll('.additional-level:checked').forEach(function (el) {
            params += '&' + el.name + '=on';
        });
        return params;
    }

    function updateNotEventDependentPages() {
        var cpuStatsUrl = '/stateful-jfr/single/cpu-stats?id=' + document.body.getAttribute('data-current');
        cpuStatsUrl += collectParams();
        storedUrls['cpuStatsUrl'] = cpuStatsUrl;
    }

    var lastPressed = undefined;

    function updatePages(pressed) {
        if (!pressed) pressed = lastPressed;
        else lastPressed = pressed;
        if (!pressed) return;

        updateNotEventDependentPages();

        var flameGraphUrl = pressed.getAttribute('data-flames-url');
        var totalTimeTableUrl = pressed.getAttribute('data-total-time-table-url');
        var selfTimeTableUrl = pressed.getAttribute('data-self-time-table-url');
        var correlationIdStatsUrl = '/stateful-jfr/single/correlation-id-stats?id=' + pressed.getAttribute('data-current');

        var params = collectParams();
        // Table limit
        var tableLimit = document.getElementById('tableLimit');
        var tableLimitParam = '&tableLimit=' + tableLimit.value;

        flameGraphUrl += params;
        totalTimeTableUrl += params + tableLimitParam;
        selfTimeTableUrl += params + tableLimitParam;
        correlationIdStatsUrl += params;

        storedUrls['flameGraphUrl'] = flameGraphUrl;
        storedUrls['totalTimeTableUrl'] = totalTimeTableUrl;
        storedUrls['selfTimeTableUrl'] = selfTimeTableUrl;
        storedUrls['correlationIdStatsUrl'] = correlationIdStatsUrl;

        updateExternalContent();
    }

    // ---- Clone page ----
    function clonePage() {
        var url = window.location.href.split('?')[0] + '?id=' + document.body.getAttribute('data-current');
        // Encode all current input state as URL hash fragment
        var state = {};
        document.querySelectorAll('input[type=checkbox]').forEach(function (el) {
            if (el.checked) state[el.id] = 'on';
        });
        document.querySelectorAll('input[type=text]').forEach(function (el) {
            if (el.value) state[el.name || el.id] = el.value;
        });
        document.querySelectorAll('input[type=radio]:checked').forEach(function (el) {
            if (el.name && el.id) state['radio_' + el.name] = el.id;
        });
        // Count dynamic filter rows
        state['_stfRows'] = document.querySelectorAll('#stackTraceFilterList .stack-trace-filter-row').length;
        state['_stncfRows'] = document.querySelectorAll('#stackTraceNotContainsFilterList .stack-trace-filter-row').length;
        window.open(url + '#' + encodeURIComponent(JSON.stringify(state)), '_blank');
    }

    function restoreFromHash() {
        if (!window.location.hash) return;
        try {
            var state = JSON.parse(decodeURIComponent(window.location.hash.substring(1)));
            // Add extra filter rows first
            var stfRows = state['_stfRows'] || 1;
            for (var i = 1; i < stfRows; i++) addFilterRow('stackTraceFilterList', 'stackTraceFilter');
            var stncfRows = state['_stncfRows'] || 1;
            for (var i = 1; i < stncfRows; i++) addFilterRow('stackTraceNotContainsFilterList', 'stackTraceNotContainsFilter');
            // Restore text inputs
            Object.keys(state).forEach(function (key) {
                if (key.startsWith('_') || key.startsWith('radio_')) return;
                if (state[key] === 'on') return;
                var el = document.querySelector('input[name="' + key + '"]') || document.getElementById(key);
                if (el && el.type === 'text') el.value = state[key];
            });
            // Restore checkboxes
            Object.keys(state).forEach(function (key) {
                if (state[key] !== 'on') return;
                var el = document.getElementById(key);
                if (el && el.type === 'checkbox') {
                    el.checked = true;
                    // Trigger visibility for filter groups
                    if (el.onchange) el.onchange();
                }
            });
            // Restore radio buttons
            Object.keys(state).forEach(function (key) {
                if (!key.startsWith('radio_')) return;
                var el = document.getElementById(state[key]);
                if (el) el.checked = true;
            });
        } catch (e) { /* ignore malformed hash */ }
    }

    // ---- Init ----
    document.addEventListener('DOMContentLoaded', function () {
        restoreFromHash();
        enableFlameGraphs();
        var restoredEvent = document.querySelector('#events input[type=radio]:checked');
        var firstEvent = restoredEvent || document.querySelector('#events input[type=radio]');
        if (firstEvent) firstEvent.click();
    });
</script>
</body>
</html>
